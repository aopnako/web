<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>时光长廊</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page gallery-page">
    <main class="gallery-shell fade-in slide-up">
      <header>
        <h1>我的照片长廊</h1>
        <p>上传照片或输入视频链接，打造你的互动记忆墙。</p>
      </header>

      <section class="gallery-controls">
        <label>
          上传照片
          <input type="file" id="photoInput" accept="image/*" />
        </label>
        <label>
          添加视频链接
          <input type="url" id="galleryVideoInput" placeholder="https://..." />
        </label>
        <button id="addVideoBtn" class="primary-btn">加入长廊</button>
      </section>

      <section id="galleryGrid" class="gallery-grid"></section>

      <a class="back-link" href="menu.html">← 回到菜单</a>
    </main>

    <script src="script.js"></script>
  </body>
</html>
