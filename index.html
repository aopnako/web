<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Afternoon Tea Home</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="page home-page">
    <main class="hero fade-in">
      <section class="hero-left">
        <p class="tagline">☕ 轻松 · 温暖 · 午后时光</p>
        <h1>欢迎来到我的下午茶小站</h1>
        <p class="subtitle">
          这里有茶壶、茶杯和你的一整天灵感。点击下方按钮，进入互动菜单。
        </p>
        <a class="order-btn" href="menu.html">order</a>
      </section>

      <section class="hero-right" aria-label="茶具插图区域">
        <div class="teapot-illustration">
          <div class="teapot-body"></div>
          <div class="teapot-lid"></div>
          <div class="teapot-handle"></div>
          <div class="teapot-spout"></div>
        </div>

        <div class="teacup-illustration">
          <div class="cup-body"></div>
          <div class="cup-handle"></div>
          <div class="steam steam1"></div>
          <div class="steam steam2"></div>
        </div>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
